name: prio
description: "A local, offline-first app for unmissable critical notifications."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_riverpod: ^2.5.1

  # Local Notifications & Alarms
  flutter_local_notifications: ^17.2.1
  android_alarm_manager_plus: ^4.0.3
  timezone: ^0.9.4

  # Local Persistence (Hive Community Edition)
  hive_ce: ^2.2.1
  hive_ce_flutter: ^2.2.1

  # Utilities
  uuid: ^4.3.3
  permission_handler: ^11.3.1
  omni_datetime_picker: ^2.1.0
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Main lints package
  flutter_lints: ^4.0.0

  # Code generators for Hive models (Fixed Version Line)
  hive_ce_generator: ^1.11.2
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
